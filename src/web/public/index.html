<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghostly Guard - Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="nav-brand">Ghostly Guard</div>
            <div class="nav-links">
                <a href="/" class="nav-link">Inicio</a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
            </div>
            <div class="nav-auth">
                <button id="login-btn" class="btn btn-primary">Entrar con Discord</button>
                <button id="logout-btn" class="btn btn-secondary hidden">Cerrar sesión</button>
            </div>
        </nav>

        <main class="main-content">
            <div id="landing" class="page">
                <div class="hero">
                    <h1>Panel de Control</h1>
                    <p>Gestiona tu servidor con seguridad avanzada</p>
                    <a href="/dashboard" class="btn btn-primary">Ir al Dashboard</a>
                </div>
            </div>

            <div id="dashboard" class="page hidden">
                <div class="server-list" id="server-list">
                    <h2>Tus Servidores</h2>
                    <div id="servers-grid" class="servers-grid"></div>
                </div>
            </div>

            <div id="guild" class="page hidden">
                <div class="guild-header">
                    <button id="back-btn" class="btn btn-secondary">← Volver</button>
                    <h2 id="guild-name">Servidor</h2>
                </div>
                <div class="guild-content">
                    <div class="section">
                        <h3>Configuración</h3>
                        <form id="settings-form" class="settings-form"></form>
                    </div>
                    <div class="section">
                        <h3>Owners Secundarios</h3>
                        <form id="owner-form" class="add-form">
                            <input type="text" id="owner-input" placeholder="ID del usuario">
                            <button type="submit" class="btn btn-primary">Agregar</button>
                        </form>
                        <div id="owners-list" class="list"></div>
                    </div>
                    <div class="section">
                        <h3>Whitelist</h3>
                        <form id="whitelist-form" class="add-form">
                            <input type="text" id="whitelist-input" placeholder="ID del usuario">
                            <button type="submit" class="btn btn-primary">Agregar</button>
                        </form>
                        <div id="whitelist-list" class="list"></div>
                    </div>
                    <div class="section">
                        <h3>Bots Autorizados</h3>
                        <form id="bot-form" class="add-form">
                            <input type="text" id="bot-input" placeholder="ID del bot">
                            <button type="submit" class="btn btn-primary">Agregar</button>
                        </form>
                        <div id="bots-list" class="list"></div>
                    </div>
                    <div class="section">
                        <h3>Bans Permanentes</h3>
                        <form id="ban-form" class="add-form">
                            <input type="text" id="ban-input" placeholder="ID a bloquear">
                            <input type="text" id="ban-reason" placeholder="Motivo (opcional)">
                            <button type="submit" class="btn btn-primary">Agregar</button>
                        </form>
                        <div id="bans-list" class="list"></div>
                    </div>
                </div>
            </div>
        </main>

        <div id="message" class="message hidden"></div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
